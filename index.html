<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhi's CodeZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .blue-text { color: #3b82f6; }
        
        /* Sidebar Animations & Responsive */
        .sidebar { transition: transform 0.3s ease-in-out; position: absolute; z-index: 50; height: 100%; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        @media (min-width: 768px) { 
            .sidebar { position: relative; transform: translateX(0) !important; box-shadow: none; } 
            .menu-btn { display: none; }
        }
        .hidden-sidebar { transform: translateX(-100%); }
        
        /* Markdown & Copy Button */
        .prose pre { background-color: #1e1f20; padding: 1rem; border-radius: 0.75rem; border: 1px solid #444746; margin: 1rem 0; overflow-x: auto; position: relative; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #374151; color: #e3e3e3; font-size: 12px; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #4b5563; transition: 0.3s; z-index: 10; }
        .copy-btn:hover { background: #4b5563; }
        
        /* Thinking Animation */
        .dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* Fade In */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden relative">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar hidden-sidebar w-[280px] bg-[#1e1f20] p-4 flex flex-col border-r border-gray-800">
        <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-xl font-bold">Abhi's <span class="blue-text">CodeZ</span></h1>
            <!-- Mobile close button for sidebar -->
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">✕</button>
        </div>
        <button onclick="createNewChat()" class="p-3 rounded-xl bg-blue-900/10 hover:bg-blue-900/30 border border-blue-500/50 w-full font-medium transition">+ New chat</button>
        <div id="history-list" class="flex-1 overflow-y-auto mt-6 space-y-2 pr-2"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-[#131314] relative">
        <header class="p-4 flex items-center border-b border-gray-800 md:border-none">
            <button onclick="toggleSidebar()" class="menu-btn p-2 mr-4 hover:bg-gray-800 rounded-lg transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <span class="font-semibold text-lg md:hidden">Abhi's CodeZ</span>
        </header>
        
        <div id="chat-viewport" class="flex-1 overflow-y-auto p-6 scroll-smooth">
            <div id="message-container" class="max-w-3xl mx-auto space-y-8"></div>
        </div>
        
        <div class="w-full px-4 pb-6 bg-[#131314]">
            <div class="max-w-3xl mx-auto bg-[#1e1f20] rounded-[24px] px-6 py-4 flex items-end border border-gray-700">
                <textarea id="chat-input" rows="1" class="w-full bg-transparent py-2 focus:outline-none resize-none max-h-32" placeholder="Ask about code..."></textarea>
                <button onclick="handleSend()" class="p-2 text-blue-400 hover:text-blue-300 transition-colors">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const _key = "c2stb3ItdjEtNTNmMDE1ZDI4M2IzNGMwM2IwMWRhYzg5NDllMmFmM2VmYzQxYTlkYzQ5NjY0M2JmZWQ0ODMxOWVhZjQyOWRiOA==";
        const API_KEY = atob(_key);
        const MODEL = "tencent/hy3:free";
        
        let chats = JSON.parse(localStorage.getItem('chats') || '[]');
        let activeId = chats.length > 0 ? chats[0].id : null;
        let isThinking = false;

        // Sidebar Toggles
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('hidden-sidebar'); 
        }
        
        function closeSidebar() {
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden-sidebar');
            }
        }

        // Handle Enter Key
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleSend(); 
            }
        });

        // Auto-resize textarea
        document.getElementById('chat-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        function save() { 
            localStorage.setItem('chats', JSON.stringify(chats)); 
            render(); 
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            const welcome = { role: 'assistant', content: "Welcome to Abhi's **CodeZ**! How can I help you with your code today?" };
            chats.unshift({ id: id, title: 'New Chat', messages: [welcome] });
            activeId = id;
            save();
            closeSidebar();
        }

        function deleteChat(event, id) {
            event.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            if (chats.length === 0) createNewChat();
            else if (activeId === id) activeId = chats[0].id;
            save();
        }

        // Robust Copy Button Logic
        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                
                btn.onclick = () => {
                    const code = pre.innerText.replace(/^Copy\n/i, '').replace(/Copy$/, '').trim();
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(code)
                            .then(() => showSuccess(btn))
                            .catch(() => fallbackCopy(code, btn));
                    } else {
                        fallbackCopy(code, btn);
                    }
                };
                pre.appendChild(btn);
            });
        }

        function fallbackCopy(text, btn) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showSuccess(btn);
            } catch (err) {
                console.error("Copy failed", err);
            }
            document.body.removeChild(textArea);
        }

        function showSuccess(btn) {
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy', 2000);
        }

        function render() {
            const list = document.getElementById('history-list');
            list.innerHTML = chats.map(c => `
                <div onclick="activeId='${c.id}'; render(); closeSidebar();" 
                     class="group flex justify-between items-center p-3 cursor-pointer ${activeId === c.id ? 'bg-[#252526]' : 'hover:bg-[#252526]'} rounded-lg text-sm transition-colors text-gray-300">
                    <span class="truncate flex-1">${c.title}</span>
                    <button onclick="deleteChat(event, '${c.id}')" class="opacity-0 group-hover:opacity-100 md:opacity-0 md:group-hover:opacity-100 opacity-100 text-gray-500 hover:text-red-400 ml-2 transition-opacity">✕</button>
                </div>
            `).join('');

            const container = document.getElementById('message-container');
            const chat = chats.find(c => c.id === activeId);
            
            if (chat) {
                container.innerHTML = chat.messages.map(m => `
                    <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} fade-in">
                        <div class="${m.role === 'user' ? 'bg-blue-600/80 px-5 py-3 rounded-2xl max-w-[80%]' : 'prose prose-invert max-w-full w-full'}">
                            ${marked.parse(m.content)}
                        </div>
                    </div>
                `).join('');
            }

            if (isThinking) {
                container.innerHTML += `
                    <div class="flex justify-start fade-in">
                        <div class="bg-[#1e1f20] px-4 py-3 rounded-2xl border border-gray-700 shadow-sm">
                            <div class="dot"></div><div class="dot mx-1"></div><div class="dot"></div>
                        </div>
                    </div>
                `;
            }
            
            addCopyButtons();
            
            // Auto scroll to bottom
            const vp = document.getElementById('chat-viewport');
            vp.scrollTop = vp.scrollHeight;
        }

        async function handleSend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeId) return;
            
            const chat = chats.find(c => c.id === activeId);
            chat.messages.push({ role: 'user', content: text });
            
            // Auto-title on first user message
            if (chat.messages.length === 2) {
                chat.title = text.substring(0, 25) + "...";
            }
            
            input.value = '';
            input.style.height = 'auto'; // Reset height
            isThinking = true;
            render();

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: MODEL, 
                        messages: [
                            {role: "system", content: "You are a helpful coding assistant. Always respond in English."}, 
                            ...chat.messages
                        ] 
                    })
                });
                
                const data = await res.json();
                if(data.choices) {
                    chat.messages.push({ role: 'assistant', content: data.choices[0].message.content });
                    save();
                } else {
                    console.error("API Error", data);
                    chat.messages.push({ role: 'assistant', content: "⚠️ Sorry, there was an error connecting to the AI." });
                }
            } catch(e) { 
                console.error("Network Error: ", e); 
                chat.messages.push({ role: 'assistant', content: "⚠️ Network error. Please check your connection." });
            } finally { 
                isThinking = false; 
                save(); 
            }
        }

        // Init
        if (chats.length === 0) createNewChat();
        else render();
    </script>
</body>
</html>
